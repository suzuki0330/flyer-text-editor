<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チラシ文字エディタ — 画像の文字をテキスト化して編集</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
    background: #f0f2f0;
    color: #333;
  }
  header {
    background: #3e7d4f;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin-right: auto; }
  .btn {
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    background: #fff;
    color: #3e7d4f;
    font-weight: 700;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: #ff9b3f; color: #fff; }
  #statusBar {
    background: #e8f1ea;
    padding: 8px 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #progressWrap {
    flex: 1;
    max-width: 300px;
    height: 8px;
    background: #cddcd2;
    border-radius: 4px;
    overflow: hidden;
    display: none;
  }
  #progressBar { height: 100%; width: 0%; background: #3e7d4f; transition: width .2s; }

  #dropZone {
    margin: 30px auto;
    max-width: 640px;
    border: 3px dashed #9fbfa9;
    border-radius: 14px;
    background: #fff;
    padding: 60px 30px;
    text-align: center;
    cursor: pointer;
  }
  #dropZone.dragover { border-color: #ff9b3f; background: #fff7ef; }
  #dropZone p { color: #667; margin-top: 10px; font-size: 14px; }
  #dropZone .big { font-size: 18px; color: #3e7d4f; font-weight: 700; }

  #editorArea { display: none; padding: 16px; }
  #canvasOuter {
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    background: #fff;
  }
  #canvasWrap {
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
  }
  #baseCanvas { display: block; }

  .textBlock {
    position: absolute;
    line-height: 1.15;
    white-space: pre;
    outline: none;
    cursor: text;
    min-width: 10px;
    border: 1px dashed transparent;
  }
  body.showGuides .textBlock { border-color: rgba(62,125,79,.55); }
  .textBlock:hover { border-color: rgba(255,155,63,.8); }
  .textBlock:focus { border: 1px solid #ff9b3f; background: rgba(255,255,255,.25); }
  .moveHandle {
    position: absolute;
    left: -22px; top: -2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #3e7d4f;
    color: #fff;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    cursor: move;
    display: none;
    user-select: none;
  }
  .textBlock:hover .moveHandle, .textBlock:focus .moveHandle { display: block; }

  #toolbar {
    display: none;
    position: sticky;
    top: 0;
    z-index: 50;
    background: #fff;
    border-bottom: 1px solid #dde5de;
    padding: 8px 20px;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  #toolbar.active { display: flex; }
  #toolbar label { display: flex; align-items: center; gap: 4px; }
  #toolbar input[type="number"] { width: 64px; padding: 4px; }
  #toolbar .btn { padding: 5px 12px; font-size: 13px; border: 1px solid #cdd; }
  #hint {
    padding: 6px 20px 0;
    font-size: 12px;
    color: #778;
    text-align: center;
  }
</style>
</head>
<body class="showGuides">

<header>
  <h1>📝 チラシ文字エディタ</h1>
  <label class="btn" style="cursor:pointer;">
    画像を開く<input type="file" id="fileInput" accept="image/*" hidden>
  </label>
  <button class="btn" id="addTextBtn" disabled>＋ 文字を追加</button>
  <button class="btn" id="toggleOrigBtn" disabled>元画像と比較</button>
  <button class="btn" id="toggleGuideBtn" disabled>枠線 表示/非表示</button>
  <button class="btn primary" id="exportBtn" disabled>PNGで保存</button>
</header>

<div id="statusBar">
  <span id="statusText">画像を読み込むと、文字を自動認識して編集できるようになります。</span>
  <div id="progressWrap"><div id="progressBar"></div></div>
</div>

<div id="toolbar">
  <strong>選択中の文字:</strong>
  <label>サイズ <input type="number" id="tbSize" min="6" max="300"></label>
  <label>色 <input type="color" id="tbColor"></label>
  <label><input type="checkbox" id="tbBold"> 太字</label>
  <button class="btn" id="tbDelete">この文字を削除</button>
</div>

<div id="hint" style="display:none;">
  文字をクリックして直接編集できます。緑の●をドラッグすると移動、上のバーでサイズ・色を変更できます。
</div>

<div id="dropZone">
  <div class="big">ここに画像をドラッグ＆ドロップ</div>
  <p>またはクリックしてファイルを選択（PNG / JPG）</p>
  <p>チラシ・ポスター画像の文字を自動で読み取り、編集できるテキストに置き換えます。</p>
</div>

<div id="editorArea">
  <div id="canvasOuter">
    <div id="canvasWrap">
      <canvas id="baseCanvas"></canvas>
      <div id="blockLayer"></div>
    </div>
  </div>
</div>

<script>
"use strict";

const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const editorArea = document.getElementById("editorArea");
const canvasOuter = document.getElementById("canvasOuter");
const canvasWrap = document.getElementById("canvasWrap");
const baseCanvas = document.getElementById("baseCanvas");
const blockLayer = document.getElementById("blockLayer");
const statusText = document.getElementById("statusText");
const progressWrap = document.getElementById("progressWrap");
const progressBar = document.getElementById("progressBar");
const toolbar = document.getElementById("toolbar");
const tbSize = document.getElementById("tbSize");
const tbColor = document.getElementById("tbColor");
const tbBold = document.getElementById("tbBold");
const tbDelete = document.getElementById("tbDelete");

const ctx = baseCanvas.getContext("2d", { willReadFrequently: true });

let originalImage = null;   // HTMLImageElement
let erasedCanvas = null;    // 文字を消した状態の画像
let erasedCtx = null;
let showingOriginal = false;
let blocks = [];            // {el, x, y, size, color, bold}
let selectedBlock = null;
let scale = 1;
let ocrDone = false;        // テスト用フラグ

const FONT_STACK = '"Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif';

// ---------- ファイル読み込み ----------
dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  loadImageFromURL(url);
}

// テストや再利用のために URL からも読み込めるようにする
function loadImageFromURL(url) {
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    originalImage = img;
    startEditing();
  };
  img.onerror = () => setStatus("画像の読み込みに失敗しました。");
  img.src = url;
}
window.__loadImageFromURL = loadImageFromURL;

function setStatus(msg) { statusText.textContent = msg; }

// ---------- OCR と編集開始 ----------
async function startEditing() {
  dropZone.style.display = "none";
  editorArea.style.display = "block";
  document.getElementById("hint").style.display = "block";
  ocrDone = false;

  const w = originalImage.naturalWidth;
  const h = originalImage.naturalHeight;
  baseCanvas.width = w;
  baseCanvas.height = h;
  ctx.drawImage(originalImage, 0, 0);

  blocks = [];
  blockLayer.innerHTML = "";
  selectedBlock = null;
  toolbar.classList.remove("active");

  fitToWindow();

  progressWrap.style.display = "block";
  setStatus("文字を認識しています…（初回は認識データのダウンロードに1〜2分かかります）");

  try {
    const worker = await Tesseract.createWorker("jpn", 1, {
      logger: m => {
        if (m.status === "recognizing text") {
          progressBar.style.width = Math.round(m.progress * 100) + "%";
        }
      }
    });
    await worker.setParameters({ tessedit_pageseg_mode: window.__psm || "3" });
    // 淡い色の文字も拾えるよう、適応的二値化した画像でOCRする
    const ocrCanvas = makeOcrCanvas();
    const { data } = await worker.recognize(ocrCanvas);
    await worker.terminate();

    // 文字を消した背景を作る
    erasedCanvas = document.createElement("canvas");
    erasedCanvas.width = w;
    erasedCanvas.height = h;
    const ectx = erasedCanvas.getContext("2d", { willReadFrequently: true });
    ectx.drawImage(originalImage, 0, 0);

    erasedCtx = ectx;

    // 判定用に元画像のピクセルを一括取得
    const fullImg = ctx.getImageData(0, 0, w, h);

    let skipped = 0;
    window.__lastLines = [];
    for (const line of (data.lines || [])) {
      const t = cleanText(line.text);
      const dbg = { text: t, conf: line.confidence, bbox: line.bbox, result: "" };
      window.__lastLines.push(dbg);
      if (!t) { dbg.result = "empty"; continue; }
      const b = line.bbox;
      const bh = b.y1 - b.y0;
      if (bh < 8 || bh > h * 0.25) { dbg.result = "height"; continue; }
      if (b.x1 - b.x0 > w * 0.98) { dbg.result = "width"; continue; }
      if (!looksLikeText(t, line.confidence)) { dbg.result = "garbage"; continue; }
      if (!isFlatBackground(fullImg, b)) { dbg.result = "photo-bg"; skipped++; continue; }
      dbg.result = "ok";

      const color = detectTextColor(b);
      const rect = eraseRegion(ectx, b);
      createBlock({
        x: b.x0,
        y: b.y0,
        size: Math.max(8, Math.round(bh * 0.92)),
        color: color,
        bold: false,
        text: t,
        rect: rect
      });
    }

    ctx.drawImage(erasedCanvas, 0, 0);
    showingOriginal = false;

    progressWrap.style.display = "none";
    let msg = `${blocks.length} 個の文字ブロックをテキスト化しました。文字をクリックして編集できます。`;
    if (skipped > 0) msg += ` 写真や飾りの上の文字 ${skipped} 箇所は、背景を壊さないため画像のまま残しています。`;
    setStatus(msg);
  } catch (err) {
    progressWrap.style.display = "none";
    setStatus("文字認識でエラーが発生しました: " + err.message + "（インターネット接続をご確認ください）");
    console.error(err);
  }

  document.getElementById("addTextBtn").disabled = false;
  document.getElementById("toggleOrigBtn").disabled = false;
  document.getElementById("toggleGuideBtn").disabled = false;
  document.getElementById("exportBtn").disabled = false;
  ocrDone = true;
}

// OCR用の前処理: グレースケール化して適応的二値化（周辺の明るさに応じて白黒を決める）。
// 淡いオレンジや緑の見出しもくっきり黒になり、認識率が上がる。
function makeOcrCanvas() {
  const w = baseCanvas.width, h = baseCanvas.height;
  const src = ctx.getImageData(0, 0, w, h);
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const j = i * 4;
    gray[i] = 0.299 * src.data[j] + 0.587 * src.data[j + 1] + 0.114 * src.data[j + 2];
  }
  // 積分画像で高速に周辺平均を計算
  const integ = new Float64Array((w + 1) * (h + 1));
  for (let y = 0; y < h; y++) {
    let rowSum = 0;
    for (let x = 0; x < w; x++) {
      rowSum += gray[y * w + x];
      integ[(y + 1) * (w + 1) + (x + 1)] = integ[y * (w + 1) + (x + 1)] + rowSum;
    }
  }
  const win = Math.max(15, Math.round(Math.min(w, h) / 16));
  const half = Math.floor(win / 2);
  const C = 10;
  const out = new ImageData(w, h);
  for (let y = 0; y < h; y++) {
    const y0 = Math.max(0, y - half), y1 = Math.min(h - 1, y + half);
    for (let x = 0; x < w; x++) {
      const x0 = Math.max(0, x - half), x1 = Math.min(w - 1, x + half);
      const area = (x1 - x0 + 1) * (y1 - y0 + 1);
      const sum = integ[(y1 + 1) * (w + 1) + (x1 + 1)] - integ[y0 * (w + 1) + (x1 + 1)]
                - integ[(y1 + 1) * (w + 1) + x0] + integ[y0 * (w + 1) + x0];
      const v = gray[y * w + x] < (sum / area) - C ? 0 : 255;
      const j = (y * w + x) * 4;
      out.data[j] = out.data[j + 1] = out.data[j + 2] = v;
      out.data[j + 3] = 255;
    }
  }
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  c.getContext("2d").putImageData(out, 0, 0);
  return c;
}

// 日本語文字間の余計なスペースを除去
function cleanText(t) {
  return t
    .replace(/([^\x00-\x7F])[ \t]+(?=[^\x00-\x7F])/g, "$1")
    .replace(/[ \t]+$/gm, "")
    .trim();
}

// 誤認識らしき文字列を弾く: 信頼度と「まともな文字」の割合で判定
function looksLikeText(t, conf) {
  if (conf < 45) return false;
  const chars = [...t.replace(/\s/g, "")];
  if (chars.length === 0) return false;
  const good = chars.filter(c =>
    /[぀-ヿ㐀-鿿！-～0-9A-Za-z。、・〜「」『』()（）:：!?！？%％＋+\-]/.test(c)
  ).length;
  if (good / chars.length < 0.7) return false;
  if (chars.length <= 2 && conf < 70) return false;
  return true;
}

// 文字枠の周囲の背景が「平坦（単色〜ゆるやかなグラデーション）」かどうか。
// 写真や葉っぱの飾りの上なら false を返し、その部分には手を付けない。
function isFlatBackground(fullImg, b) {
  const w = fullImg.width, h = fullImg.height;
  const px = (x, y) => {
    x = Math.max(0, Math.min(w - 1, Math.round(x)));
    y = Math.max(0, Math.min(h - 1, Math.round(y)));
    const i = (y * w + x) * 4;
    return [fullImg.data[i], fullImg.data[i + 1], fullImg.data[i + 2]];
  };
  const pad = 6, step = 8;
  const pts = [];
  for (let x = b.x0 - pad; x <= b.x1 + pad; x += step) {
    pts.push(px(x, b.y0 - pad));
    pts.push(px(x, b.y1 + pad));
  }
  for (let y = b.y0; y <= b.y1; y += step) {
    pts.push(px(b.x0 - pad, y));
    pts.push(px(b.x1 + pad, y));
  }
  if (pts.length < 4) return false;

  const mean = [0, 1, 2].map(c => pts.reduce((s, p) => s + p[c], 0) / pts.length);
  const variance = [0, 1, 2].map(c =>
    pts.reduce((s, p) => s + (p[c] - mean[c]) ** 2, 0) / pts.length
  );
  const stddev = Math.sqrt((variance[0] + variance[1] + variance[2]) / 3);
  return stddev < 22;
}

// ---------- 背景の復元（文字消し） ----------
// 行ごとに左右の外側の色をサンプリングし、横方向グラデーションで塗りつぶす
function eraseRegion(ectx, b) {
  const pad = 4;
  const x0 = Math.max(0, b.x0 - pad);
  const y0 = Math.max(0, b.y0 - pad);
  const x1 = Math.min(baseCanvas.width - 1, b.x1 + pad);
  const y1 = Math.min(baseCanvas.height - 1, b.y1 + pad);
  const w = x1 - x0, h = y1 - y0;
  if (w <= 0 || h <= 0) return null;

  const img = ectx.getImageData(0, 0, baseCanvas.width, baseCanvas.height);

  const sample = (x, y) => {
    x = Math.max(0, Math.min(baseCanvas.width - 1, x));
    y = Math.max(0, Math.min(baseCanvas.height - 1, y));
    const i = (y * baseCanvas.width + x) * 4;
    return [img.data[i], img.data[i + 1], img.data[i + 2]];
  };
  // 数ピクセルの平均を取る
  const sampleAvg = (x, y) => {
    let r = 0, g = 0, bl = 0, n = 0;
    for (let dy = -2; dy <= 2; dy++) {
      const c = sample(x, y + dy);
      r += c[0]; g += c[1]; bl += c[2]; n++;
    }
    return [r / n, g / n, bl / n];
  };

  const out = ectx.getImageData(x0, y0, w, h);
  for (let row = 0; row < h; row++) {
    const gy = y0 + row;
    const left = sampleAvg(x0 - 6, gy);
    const right = sampleAvg(x1 + 6, gy);
    for (let col = 0; col < w; col++) {
      const t = col / (w - 1 || 1);
      const i = (row * w + col) * 4;
      out.data[i]     = left[0] + (right[0] - left[0]) * t;
      out.data[i + 1] = left[1] + (right[1] - left[1]) * t;
      out.data[i + 2] = left[2] + (right[2] - left[2]) * t;
      out.data[i + 3] = 255;
    }
  }
  ectx.putImageData(out, x0, y0);
  return { x0, y0, x1, y1 };
}

// ---------- 文字色の推定 ----------
// 枠外の背景色から一番離れた色（＝文字の色）を探す
function detectTextColor(b) {
  const w = baseCanvas.width, h = baseCanvas.height;
  const x0 = Math.max(0, b.x0), y0 = Math.max(0, b.y0);
  const x1 = Math.min(w - 1, b.x1), y1 = Math.min(h - 1, b.y1);
  if (x1 <= x0 || y1 <= y0) return "#333333";

  const region = ctx.getImageData(x0, y0, x1 - x0, y1 - y0).data;

  // 背景色: 領域の四隅の平均
  const corner = (px, py) => {
    const i = (py * (x1 - x0) + px) * 4;
    return [region[i], region[i + 1], region[i + 2]];
  };
  const c1 = corner(0, 0), c2 = corner(x1 - x0 - 1, 0),
        c3 = corner(0, y1 - y0 - 1), c4 = corner(x1 - x0 - 1, y1 - y0 - 1);
  const bg = [0, 1, 2].map(i => (c1[i] + c2[i] + c3[i] + c4[i]) / 4);

  // 背景から離れたピクセルを集めて平均
  let r = 0, g = 0, bl = 0, n = 0;
  for (let i = 0; i < region.length; i += 16) { // 4ピクセルおきに間引き
    const dr = region[i] - bg[0], dg = region[i + 1] - bg[1], db = region[i + 2] - bg[2];
    if (dr * dr + dg * dg + db * db > 5000) {
      r += region[i]; g += region[i + 1]; bl += region[i + 2]; n++;
    }
  }
  if (n < 5) return "#333333";
  const hex = v => Math.round(v / n).toString(16).padStart(2, "0");
  return "#" + hex(r) + hex(g) + hex(bl);
}

// ---------- テキストブロック ----------
function createBlock(opts) {
  const el = document.createElement("div");
  el.className = "textBlock";
  el.contentEditable = "true";
  el.spellcheck = false;
  el.textContent = opts.text;

  const handle = document.createElement("div");
  handle.className = "moveHandle";
  handle.textContent = "✥";
  handle.contentEditable = "false";
  el.appendChild(handle);

  const block = { el, x: opts.x, y: opts.y, size: opts.size, color: opts.color, bold: opts.bold, rect: opts.rect || null };
  applyBlockStyle(block);
  blockLayer.appendChild(el);
  blocks.push(block);

  el.addEventListener("focus", () => selectBlock(block));
  el.addEventListener("input", () => { /* 内容は el.innerText から取得 */ });

  // 移動ハンドル
  handle.addEventListener("mousedown", e => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const origX = block.x, origY = block.y;
    const onMove = ev => {
      block.x = origX + (ev.clientX - startX) / scale;
      block.y = origY + (ev.clientY - startY) / scale;
      applyBlockStyle(block);
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  });

  return block;
}

function applyBlockStyle(b) {
  b.el.style.left = b.x + "px";
  b.el.style.top = b.y + "px";
  b.el.style.fontSize = b.size + "px";
  b.el.style.color = b.color;
  b.el.style.fontWeight = b.bold ? "700" : "400";
  b.el.style.fontFamily = FONT_STACK;
}

function selectBlock(b) {
  selectedBlock = b;
  toolbar.classList.add("active");
  tbSize.value = b.size;
  tbColor.value = b.color;
  tbBold.checked = b.bold;
}

tbSize.addEventListener("input", () => {
  if (!selectedBlock) return;
  selectedBlock.size = parseInt(tbSize.value) || 12;
  applyBlockStyle(selectedBlock);
});
tbColor.addEventListener("input", () => {
  if (!selectedBlock) return;
  selectedBlock.color = tbColor.value;
  applyBlockStyle(selectedBlock);
});
tbBold.addEventListener("change", () => {
  if (!selectedBlock) return;
  selectedBlock.bold = tbBold.checked;
  applyBlockStyle(selectedBlock);
});
tbDelete.addEventListener("click", () => {
  if (!selectedBlock) return;
  // 消してあった元画像の文字を復元する（自動認識ブロックのみ）
  const r = selectedBlock.rect;
  if (r && erasedCtx && originalImage) {
    erasedCtx.drawImage(originalImage, r.x0, r.y0, r.x1 - r.x0, r.y1 - r.y0,
                                        r.x0, r.y0, r.x1 - r.x0, r.y1 - r.y0);
    if (!showingOriginal) ctx.drawImage(erasedCanvas, 0, 0);
  }
  selectedBlock.el.remove();
  blocks = blocks.filter(b => b !== selectedBlock);
  selectedBlock = null;
  toolbar.classList.remove("active");
  setStatus("ブロックを削除し、その部分は元画像に戻しました。");
});

// ---------- ヘッダーのボタン ----------
document.getElementById("addTextBtn").addEventListener("click", () => {
  const b = createBlock({
    x: baseCanvas.width * 0.1,
    y: baseCanvas.height * 0.1,
    size: 32,
    color: "#333333",
    bold: false,
    text: "新しいテキスト"
  });
  b.el.focus();
});

document.getElementById("toggleOrigBtn").addEventListener("click", () => {
  showingOriginal = !showingOriginal;
  ctx.drawImage(showingOriginal ? originalImage : erasedCanvas, 0, 0);
  blockLayer.style.visibility = showingOriginal ? "hidden" : "visible";
});

document.getElementById("toggleGuideBtn").addEventListener("click", () => {
  document.body.classList.toggle("showGuides");
});

// ---------- PNG 書き出し ----------
document.getElementById("exportBtn").addEventListener("click", () => {
  const w = baseCanvas.width, h = baseCanvas.height;
  const exp = document.createElement("canvas");
  exp.width = w;
  exp.height = h;
  const ex = exp.getContext("2d");
  ex.drawImage(erasedCanvas || baseCanvas, 0, 0);
  ex.textBaseline = "top";

  for (const b of blocks) {
    ex.font = `${b.bold ? "700" : "400"} ${b.size}px ${FONT_STACK}`;
    ex.fillStyle = b.color;
    // moveHandle のテキストを除外するため childNodes からテキストを組み立てる
    const text = getBlockText(b);
    const lines = text.split("\n");
    lines.forEach((line, i) => {
      ex.fillText(line, b.x + 1, b.y + 1 + i * b.size * 1.15);
    });
  }

  const a = document.createElement("a");
  a.download = "flyer-edited.png";
  a.href = exp.toDataURL("image/png");
  a.click();
  setStatus("PNGを保存しました。印刷やSNS投稿にそのまま使えます。");
});

function getBlockText(b) {
  let t = "";
  b.el.childNodes.forEach(n => {
    if (n.nodeType === Node.TEXT_NODE) t += n.textContent;
    else if (n.nodeName === "BR") t += "\n";
    else if (n.nodeType === Node.ELEMENT_NODE && !n.classList.contains("moveHandle")) t += n.innerText;
  });
  return t;
}

// ---------- 表示スケール ----------
function fitToWindow() {
  if (!originalImage) return;
  const maxW = Math.min(document.body.clientWidth - 32, 1100);
  scale = Math.min(1, maxW / baseCanvas.width);
  canvasWrap.style.transform = `scale(${scale})`;
  canvasOuter.style.width = baseCanvas.width * scale + "px";
  canvasOuter.style.height = baseCanvas.height * scale + "px";
}
window.addEventListener("resize", fitToWindow);

// テスト用: OCR完了フラグと ブロック情報の取得
window.__getState = () => ({
  ocrDone,
  blockCount: blocks.length,
  blocks: blocks.map(b => ({ x: b.x, y: b.y, size: b.size, color: b.color, text: getBlockText(b) }))
});
</script>
</body>
